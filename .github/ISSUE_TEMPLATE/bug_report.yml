name: Bug report
description: Something is broken or behaves unexpectedly.
title: "fix: "
labels: ["kind:bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please fill in every section — incomplete reports tend to sit longer.
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Output of `npm pkg get version` (or commit SHA if running from a branch).
      placeholder: 0.4.2 or 7f3a1b9
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: false
      options:
        - ui (Today/Pipeline/Pond/Signals/Account/Quote/Workflows)
        - ontology (object types, links, actions, marking)
        - storage (event log, IDB, promises, vacuum)
        - api (mock client, mutations)
        - workflow runner / schedules
        - tests (unit / e2e / visual)
        - build / repo plumbing
        - docs
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - p0 — outage / data loss / PII exposure
        - p1 — major flow broken
        - p2 — degraded experience
        - p3 — cosmetic / nice-to-have
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Numbered list — exact keystrokes / clicks / data.
      placeholder: |
        1. Open / on a fresh tab
        2. Press Cmd-K
        3. Type "alvarez"
        4. Observe …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior (with logs / screenshots / req-id)
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser + OS
      placeholder: "Chrome 134 on macOS 15.4"
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Additional context
