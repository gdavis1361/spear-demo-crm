name: synthetics

# Scheduled external probe of production. Exercises the same core flows as
# the smoke suite (landing paint, keyboard nav, Cmd+K palette) against the
# public URL. On 3 consecutive failures, dispatches the `deploy` workflow
# with the previous green SHA as input to roll back.
#
# Required repo variables:
#   PROD_URL             — canonical production URL
#
# Required repo secrets:
#   (inherits GITHUB_TOKEN for cross-workflow dispatch)

on:
  schedule:
    # Every 5 minutes. Cron windows on GitHub-hosted runners can slip by
    # a few minutes under load — budget accordingly when setting SLOs.
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: write # needed to dispatch deploy workflow on rollback

concurrency:
  group: synthetics
  cancel-in-progress: true

jobs:
  probe:
    name: synthetic smoke (production)
    runs-on: ubuntu-latest
    outputs:
      conclusion: ${{ job.status }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - run: npm ci
      - if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Probe production
        env:
          SYNTHETIC_BASE_URL: ${{ vars.PROD_URL }}
        run: npx playwright test --project=chromium-synthetic tests/synthetic.spec.ts

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: synthetic-${{ github.run_id }}
          path: |
            test-results/**
            playwright-report/**
          retention-days: 30

  rollback-on-sustained-failure:
    # Dispatches a redeploy of the most recent tagged release when this run
    # AND the two prior runs all failed — the "3 consecutive failures" rule.
    name: rollback if 3 consecutive failures
    needs: probe
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Check recent synthetic history
        id: history
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'synthetics.yml',
              per_page: 4,
              status: 'completed',
            });
            const recent = data.workflow_runs.slice(0, 3);
            const allFailed = recent.length === 3 && recent.every(r => r.conclusion === 'failure');
            core.setOutput('all_failed', String(allFailed));
            core.info(`Recent conclusions: ${recent.map(r => r.conclusion).join(', ')}`);

      - name: Dispatch rollback
        if: steps.history.outputs.all_failed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            // Find the most recent successful deploy and trigger a redeploy.
            const { data: deploys } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              per_page: 20,
              status: 'success',
            });
            const previous = deploys.workflow_runs.find(r => r.head_branch === 'main');
            if (!previous) {
              core.setFailed('No prior successful deploy to roll back to.');
              return;
            }
            core.info(`Rolling back to ${previous.head_sha} (from ${previous.html_url})`);
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main',
              inputs: { ref: previous.head_sha },
            });
