name: synthetics

# Scheduled external probe of production. Exercises the same core flows as
# the smoke suite (landing paint, keyboard nav, Cmd+K palette) against the
# public URL. On 3 consecutive failures, dispatches the `deploy` workflow
# with the previous green SHA as input to roll back.
#
# Required repo variables:
#   PROD_URL             — canonical production URL
#
# Required repo secrets:
#   (inherits GITHUB_TOKEN for cross-workflow dispatch)

on:
  schedule:
    # Every 5 minutes. Cron windows on GitHub-hosted runners can slip by
    # a few minutes under load — budget accordingly when setting SLOs.
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: write # needed to dispatch deploy workflow on rollback
  # G8: on sustained failure we also open/update a GitHub issue so the
  # team finds out about an auto-rollback within seconds instead of the
  # next morning. Watchers get email + mobile notifications; no Slack
  # dependency required.
  issues: write

concurrency:
  group: synthetics
  cancel-in-progress: true

jobs:
  probe:
    name: synthetic smoke (production)
    runs-on: ubuntu-latest
    # The probe fires every 5 min; a job that hangs past the cadence starts
    # overlapping itself and the `concurrency: cancel-in-progress: true`
    # rule will keep cancelling new runs. 5 min is the hard ceiling: if
    # the probe takes longer than the cadence, something is already wrong.
    timeout-minutes: 5
    outputs:
      conclusion: ${{ job.status }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - run: npm ci
      - if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Fail fast if PROD_URL is unset
        # Without this the synthetic spec `test.skip`s on missing env and
        # every run reports green forever, masking a misconfigured repo.
        run: |
          if [ -z "${{ vars.PROD_URL }}" ]; then
            echo "::error::PROD_URL repo variable is not set; see docs/ops/secrets.md"
            exit 1
          fi

      - name: Probe production
        env:
          SYNTHETIC_BASE_URL: ${{ vars.PROD_URL }}
        run: npx playwright test --project=chromium-synthetic tests/synthetic.spec.ts

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: synthetic-${{ github.run_id }}
          path: |
            test-results/**
            playwright-report/**
          retention-days: 30

  rollback-on-sustained-failure:
    # Dispatches a redeploy of the most recent tagged release when this run
    # AND the two prior runs all failed — the "3 consecutive failures" rule.
    # Also opens / updates a GitHub issue so humans are notified (G8).
    name: rollback + notify (3 consecutive failures)
    needs: probe
    if: failure()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check recent synthetic history
        id: history
        uses: actions/github-script@v7
        with:
          script: |
            // `status: completed` excludes the current run. We want
            // "3 consecutive failures counting this one", so check the 2
            // prior completed runs plus the current (which is failing).
            const { data } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'synthetics.yml',
              per_page: 3,
              status: 'completed',
            });
            const recent = data.workflow_runs.slice(0, 2);
            const priorBothFailed = recent.length === 2 && recent.every(r => r.conclusion === 'failure');
            core.setOutput('should_rollback', String(priorBothFailed));
            core.info(`Prior conclusions: ${recent.map(r => r.conclusion).join(', ')} — this run failed, rollback=${priorBothFailed}`);

      - name: Cool-down check (G8)
        id: cooldown
        if: steps.history.outputs.should_rollback == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            // Refuse to auto-dispatch if the previous deploy run was
            // itself a rollback dispatched within the last 30 minutes.
            // Prevents runaway rollback loops: if root-cause isn't
            // fixed, every subsequent probe would otherwise fire another
            // rollback against already-reverting infrastructure.
            //
            // We detect a prior rollback by checking deploy.yml runs
            // triggered by `workflow_dispatch` (rollbacks) vs `push`
            // (normal merges).
            const COOLDOWN_MINUTES = 30;
            const since = new Date(Date.now() - COOLDOWN_MINUTES * 60_000).toISOString();
            const { data } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              event: 'workflow_dispatch',
              per_page: 5,
              created: `>=${since}`,
            });
            const recentRollback = data.workflow_runs[0];
            const inCooldown = Boolean(recentRollback);
            core.setOutput('in_cooldown', String(inCooldown));
            if (inCooldown) {
              core.warning(
                `Cool-down active: recent rollback at ${recentRollback.created_at} ` +
                `(${recentRollback.html_url}). Skipping auto-dispatch; filing issue for human review.`
              );
            }

      - name: Open / update incident issue (G8)
        if: steps.history.outputs.should_rollback == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            // One canonical incident issue, updated on every run while
            // the incident is active. Closed manually once root cause
            // ships. The issue is the team's notification channel —
            // watchers get email + mobile, no Slack secret needed.
            const { data: mainBranch } = await github.rest.repos.getBranch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              branch: 'main',
            });
            const brokenSha = mainBranch.commit.sha;
            const cooldown = '${{ steps.cooldown.outputs.in_cooldown }}' === 'true';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const title = `Auto-rollback: synthetic probe failing on main (${brokenSha.slice(0, 7)})`;
            const body = [
              '### Sustained synthetic failure',
              '',
              `- **Broken SHA:** \`${brokenSha}\``,
              `- **Probe run:** ${runUrl}`,
              `- **Cool-down active:** ${cooldown ? 'yes — rollback SKIPPED, human review required' : 'no — rollback dispatched'}`,
              '',
              '### What to do',
              '',
              '1. Click the probe run above and review `playwright-report/` artifacts.',
              '2. If the rollback succeeds, open a fix PR against main and close this issue when the fix ships.',
              '3. If cool-down blocked rollback, decide: manually dispatch `deploy.yml` with a known-good SHA, or ship a forward-fix.',
              '',
              '<sub>Opened by `synthetics.yml → rollback + notify`. Updated on every sustained-failure run while open.</sub>',
            ].join('\n');

            // Look for an existing open incident issue (label + title prefix).
            const { data: open } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'incident,auto-rollback',
              per_page: 5,
            });
            const existing = open.find((i) => i.title.startsWith('Auto-rollback:'));
            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                title,
                body,
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Another sustained failure on \`${brokenSha.slice(0, 7)}\` — probe run: ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['incident', 'auto-rollback'],
              });
            }

      - name: Dispatch rollback
        if: steps.history.outputs.should_rollback == 'true' && steps.cooldown.outputs.in_cooldown != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            // Current tip of main — the broken SHA. The current deploy of
            // main succeeded at the deploy.yml level (the app broke
            // post-deploy, which is what synthetics is designed to catch),
            // so without this filter we would try to "roll back" to the
            // same broken SHA.
            const { data: mainBranch } = await github.rest.repos.getBranch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              branch: 'main',
            });
            const brokenSha = mainBranch.commit.sha;

            const { data: deploys } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              per_page: 20,
              status: 'success',
            });
            const previous = deploys.workflow_runs.find(
              r => r.head_branch === 'main' && r.head_sha !== brokenSha
            );
            if (!previous) {
              core.setFailed(`No prior green deploy available to roll back to (current broken SHA: ${brokenSha}).`);
              return;
            }
            core.info(`Rolling back from ${brokenSha} → ${previous.head_sha} (${previous.html_url})`);
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main',
              inputs: { ref: previous.head_sha },
            });
