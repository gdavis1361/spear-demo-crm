name: ci

on:
  pull_request:
  push:
    branches: [main]

# Cancel duplicate runs when a PR is updated
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  # G4: the build job's "Coverage summary comment" step creates/updates
  # a PR comment via actions/github-script. Scoped to the workflow, not
  # individual jobs, so the principle-of-least-privilege surface is one
  # grep away.
  pull-requests: write

jobs:
  build:
    name: typecheck · lint · unit · build
    runs-on: ubuntu-latest
    # GitHub's default job timeout is 6h — long enough to burn a runner on
    # a stuck npm install or vitest hang without signal. Empirical wallclock
    # for this job is ~1 min; 15m is generous enough for a cold npm cache
    # and a slower runner pool on busy days.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install (offline-friendly)
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests with coverage
        run: npm run test:cov -- --reporter=verbose

      # G4: replace the always-green Codecov step with a self-contained
      # coverage summary posted as a PR comment. Reads
      # `coverage/coverage-summary.json` (enabled by the `json-summary`
      # reporter in `vitest.config.ts`), compares aggregate %s to the
      # thresholds declared there, and posts/updates a single comment
      # per PR. No external service, no token, no `continue-on-error`
      # masking a silent failure.
      # Runs eslint in count-only mode so the github-script step below can
      # include "0 errors, 0 warnings" in the PR comment. `npm run lint`
      # earlier in the job is the merge-gating check (--max-warnings=0);
      # this second run is purely for the comment's invariant line.
      - name: Collect ESLint counts for PR comment
        if: github.event_name == 'pull_request'
        id: lint_counts
        continue-on-error: true
        run: |
          json=$(npx eslint src --format=json || true)
          echo "$json" > .eslint-report.json

      - name: Coverage + lint summary comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const covPath = 'coverage/coverage-summary.json';
            if (!fs.existsSync(covPath)) {
              core.warning('coverage-summary.json not found — skipping PR comment');
              return;
            }
            const summary = JSON.parse(fs.readFileSync(covPath, 'utf8')).total;
            // Mirror the thresholds from vitest.config.ts. When they move
            // there, move them here.
            const thresholds = { lines: 75, functions: 65, branches: 60, statements: 75 };
            const metrics = ['lines', 'statements', 'functions', 'branches'];
            const rows = metrics.map((m) => {
              const pct = summary[m].pct;
              const pass = pct >= thresholds[m];
              return `| ${m} | ${pct.toFixed(2)}% | ${thresholds[m]}% | ${pass ? 'ok' : 'below'} |`;
            });

            // Lint invariant: names the "0 warnings" invariant out loud
            // so a silent drift back from the 37-warning cleanup is
            // visible on every PR. If the report is missing (rare), we
            // say so rather than lying.
            let lintLine = 'ESLint: report unavailable';
            const lintPath = '.eslint-report.json';
            if (fs.existsSync(lintPath)) {
              try {
                const report = JSON.parse(fs.readFileSync(lintPath, 'utf8'));
                let errors = 0, warnings = 0;
                for (const file of report) {
                  errors += file.errorCount || 0;
                  warnings += file.warningCount || 0;
                }
                lintLine = `ESLint: ${errors} error${errors === 1 ? '' : 's'}, ${warnings} warning${warnings === 1 ? '' : 's'} (gated at 0)`;
              } catch (e) {
                lintLine = 'ESLint: report parse failed';
              }
            }

            const body = [
              '### Coverage summary',
              '',
              '| metric | current | threshold | status |',
              '| --- | ---: | ---: | :---: |',
              ...rows,
              '',
              lintLine,
              '',
              '<sub>Reporter: `vitest --coverage` · Thresholds: `vitest.config.ts` · Lint gate: `--max-warnings=0`</sub>',
            ].join('\n');

            // One comment per PR, updated in place. Saves a scroll on
            // long PRs and keeps history on the comment itself.
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) =>
              c.user.type === 'Bot' && c.body.startsWith('### Coverage summary')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Build
        run: npm run build

      - name: Bundle-budget gate
        run: npm run size

      - name: SBOM (SPDX)
        run: npm sbom --sbom-format=spdx --omit=dev > sbom.spdx.json

      - name: Upload dist + sbom
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: |
            dist/**
            sbom.spdx.json
          if-no-files-found: error
          retention-days: 14

  e2e:
    name: e2e (${{ matrix.project }})
    runs-on: ubuntu-latest
    # Each matrix leg is ~1.5 min; 20m covers a cold Playwright browser
    # install (~2 min) plus retries up to the configured ceiling without
    # falling through to the platform-default 6h.
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        project: [chromium-smoke, firefox-smoke, webkit-smoke]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      # Cache Playwright browser binaries — cuts ~30s off every job.
      # Key is suffixed with `-all` because this job needs chromium/firefox/webkit;
      # the visual-bootstrap workflow uses a `-chromium` cache so the two don't
      # collide (a partial cache from bootstrap would leave firefox/webkit missing).
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-all-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - run: npm ci
      - name: Install Playwright browsers (only if cache missed)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium firefox webkit
      - name: Install Playwright OS deps (always — cached binaries skip this)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium firefox webkit

      - name: Smoke + a11y
        run: npx playwright test --project=${{ matrix.project }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-${{ matrix.project }}-${{ github.run_id }}
          path: |
            test-results/**
            playwright-report/**
          retention-days: 7

  visual:
    name: visual regression (chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - run: npm ci
      - if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Pixel diff against baselines
        run: npm run test:visual
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: visual-diffs-${{ github.run_id }}
          path: |
            test-results/**
            playwright-report/**
          retention-days: 14

  audit:
    name: supply chain
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Verify package signatures
        run: npm audit signatures
      - name: High+ severity vulns block the merge
        run: npm audit --audit-level=high --omit=dev
