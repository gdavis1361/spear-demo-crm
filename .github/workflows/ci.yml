name: ci

on:
  pull_request:
  push:
    branches: [main]

# Cancel duplicate runs when a PR is updated
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: typecheck · lint · unit · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install (offline-friendly)
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests with coverage
        run: npm run test:cov -- --reporter=verbose

      # TODO(codecov): drop `continue-on-error` once CODECOV_TOKEN is configured
      # in repo secrets and the first upload succeeds.
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: false
          files: coverage/lcov.info
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Bundle-budget gate
        run: npm run size

      - name: SBOM (SPDX)
        run: npm sbom --sbom-format=spdx --omit=dev > sbom.spdx.json

      - name: Upload dist + sbom
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: |
            dist/**
            sbom.spdx.json
          if-no-files-found: error
          retention-days: 14

  e2e:
    name: e2e (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [chromium-smoke, firefox-smoke, webkit-smoke]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      # Cache Playwright browser binaries — cuts ~30s off every job.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - run: npm ci
      - name: Install Playwright browsers (only if cache missed)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium firefox webkit
      - name: Install Playwright OS deps (always — cached binaries skip this)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium firefox webkit

      - name: Smoke + a11y
        run: npx playwright test --project=${{ matrix.project }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-${{ matrix.project }}-${{ github.run_id }}
          path: |
            test-results/**
            playwright-report/**
          retention-days: 7

  visual:
    name: visual regression (chromium)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - run: npm ci
      - if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Pixel diff against baselines
        run: npm run test:visual
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: visual-diffs-${{ github.run_id }}
          path: |
            test-results/**
            playwright-report/**
          retention-days: 14

  audit:
    name: supply chain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - name: Verify package signatures
        run: npm audit signatures
      - name: High+ severity vulns block the merge
        run: npm audit --audit-level=high --omit=dev
