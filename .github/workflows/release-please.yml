name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write # SLSA build provenance attestation
  attestations: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-release-artifact:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run build

      - name: Generate SBOM (SPDX)
        run: npm sbom --sbom-format=spdx --omit=dev > sbom.spdx.json

      - name: Tarball the build
        run: tar -czf spear-${{ needs.release-please.outputs.tag_name }}.tgz dist/

      - name: SLSA build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            spear-${{ needs.release-please.outputs.tag_name }}.tgz
            sbom.spdx.json

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            spear-${{ needs.release-please.outputs.tag_name }}.tgz
            sbom.spdx.json
