name: visual-bootstrap

# Manually-triggered job that regenerates the visual-regression baselines
# inside CI (Linux). Use this whenever the design intentionally shifts and
# the existing macOS-recorded baselines no longer match what the CI runner
# produces. The job opens a PR with the refreshed `-linux.png` snapshots so
# a human reviews the diff before it lands.

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are we re-baselining? (links to design ticket / PR if any)'
        required: true
        type: string
      target_ref:
        description: 'Branch/ref to checkout and re-baseline against. Defaults to main.'
        required: false
        type: string
        default: main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: visual-bootstrap
  cancel-in-progress: true

jobs:
  rebaseline:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.target_ref }}

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - run: npm ci
      - if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Build (snapshots target the production bundle)
        run: npm run build

      - name: Regenerate Linux baselines
        run: npm run test:visual:update

      - name: Open PR with refreshed baselines
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/rebaseline-visual-${{ github.run_id }}
          base: ${{ inputs.target_ref }}
          commit-message: 'chore(tests): regenerate visual baselines on Linux'
          title: 'chore(tests): regenerate visual baselines (${{ inputs.target_ref }})'
          body: |
            Refreshed via the `visual-bootstrap` workflow.

            **Reason:** ${{ inputs.reason }}
            **Target ref:** `${{ inputs.target_ref }}`

            Reviewer: open the PR's *Files changed* tab and inspect each
            `tests/visual/**/*-snapshots/*-linux.png` against the previous
            baseline. Approve only if the visual delta matches the intent.
          labels: |
            kind:chore
            area:tests
          delete-branch: true
