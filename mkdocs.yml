site_name: Spear CRM
site_description: A CRM rebuilt around how moves actually work.
site_url: https://OWNER.github.io/REPO/ # TODO(repo-url)
repo_url: https://github.com/OWNER/REPO # TODO(repo-url)
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.top
    - content.code.copy
    - content.action.edit
  palette:
    - media: '(prefers-color-scheme: light)'
      scheme: default
      primary: black
      accent: amber
      toggle: { icon: material/weather-night, name: Switch to dark }
    - media: '(prefers-color-scheme: dark)'
      scheme: slate
      primary: black
      accent: amber
      toggle: { icon: material/weather-sunny, name: Switch to light }

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - pymdownx.details
  - pymdownx.highlight: { anchor_linenums: true }
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Ontology: ontology.md
  - Runtime: runtime.md
